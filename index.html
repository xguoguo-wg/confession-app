<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ 我喜欢你 ❤️</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg);opacity:1}25%{transform:translateY(-30px) rotate(10deg);opacity:.9}50%{transform:translateY(-60px) rotate(-5deg);opacity:.7}75%{transform:translateY(-30px) rotate(-10deg);opacity:.85}}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.3)}30%{transform:scale(1)}45%{transform:scale(1.2)}60%{transform:scale(1)}}
@keyframes twinkle{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes slideIn{from{opacity:0;transform:translateY(50px) scale(.8)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes gradientBG{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes shake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(-5deg)}75%{transform:rotate(5deg)}}
@keyframes pulseGlow{0%,100%{box-shadow:0 8px 25px rgba(255,107,107,.4)}50%{box-shadow:0 8px 45px rgba(255,107,107,.8),0 0 80px rgba(255,107,107,.4)}}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(-45deg,#ff6b6b,#ff8e8e,#ffd4d4,#ffb3b3,#ff6b6b);background-size:400% 400%;animation:gradientBG 8s ease infinite;font-family:'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;position:relative}
.hearts-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden}
.heart-bg{position:absolute;color:rgba(255,255,255,.15);font-size:20px;animation:float linear infinite;user-select:none}
.container{position:relative;z-index:10;text-align:center;padding:2rem;max-width:700px;width:90%}
.card{background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:3rem 2.5rem;border-radius:30px;box-shadow:0 20px 60px rgba(255,107,107,.3),0 0 120px rgba(255,107,107,.1),inset 0 1px 0 rgba(255,255,255,.8);animation:slideIn 1.2s ease-out;border:1px solid rgba(255,255,255,.6);position:relative}
.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 40%,rgba(255,107,107,.05) 0%,transparent 60%);animation:shake 10s ease-in-out infinite;pointer-events:none}
.main-heart{font-size:5rem;display:inline-block;animation:heartBeat 1.5s ease-in-out infinite;cursor:pointer;transition:.3s;margin-bottom:.5rem;filter:drop-shadow(0 4px 15px rgba(255,50,50,.3))}
.main-heart:hover{filter:drop-shadow(0 4px 30px rgba(255,50,50,.6))}
.title{font-size:2.2rem;font-weight:700;color:#d63031;margin:.8rem 0;text-shadow:0 2px 10px rgba(214,48,49,.15);letter-spacing:2px;transition:transform .5s ease}
.subtitle{font-size:1.1rem;color:#e17055;margin-bottom:1.8rem;font-weight:500;letter-spacing:1px;opacity:.9}
.love-text{font-size:4rem;font-weight:900;color:#d63031;line-height:1.5;letter-spacing:8px;text-shadow:0 4px 20px rgba(214,48,49,.25);margin:.8rem 0 1.2rem;animation:heartBeat 2s ease-in-out infinite;display:inline-block}
.blessings-container{position:relative;margin:1.5rem 0;min-height:90px;display:flex;align-items:center;justify-content:center}
.blessing{font-size:1.15rem;color:#636e72;line-height:1.8;padding:.8rem 1.5rem;background:linear-gradient(135deg,rgba(255,107,107,.08),rgba(255,214,214,.12));border-radius:16px;position:absolute;width:100%;opacity:0;transform:scale(.8);transition:all .6s cubic-bezier(.68,-.55,.265,1.55);border:1px solid rgba(255,107,107,.1);backdrop-filter:blur(5px)}
.blessing.active{opacity:1;transform:scale(1)}
.deco-hearts{margin:1rem 0;font-size:1.5rem;letter-spacing:8px;animation:twinkle 2s ease-in-out infinite;color:#ff6b6b}
.btn-group{display:flex;gap:1rem;justify-content:center;margin-top:1.8rem;flex-wrap:wrap;position:relative}
.btn{padding:.9rem 2.2rem;border:none;border-radius:50px;font-size:1rem;font-weight:600;cursor:pointer;letter-spacing:1px;outline:none;user-select:none;transition:transform .3s ease,box-shadow .3s ease}
.btn::after{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.2) 0%,transparent 60%);opacity:0;transition:opacity .3s;pointer-events:none}
.btn:hover::after{opacity:1}
.btn-primary{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;box-shadow:0 8px 25px rgba(255,107,107,.4);animation:pulseGlow 2s ease-in-out infinite;position:relative}
.btn-primary:hover{transform:translateY(-3px) scale(1.05)}
.btn-secondary{background:rgba(255,107,107,.1);color:#d63031;border:2px solid rgba(255,107,107,.25);position:relative}
.btn-secondary:hover{background:rgba(255,107,107,.2);transform:translateY(-3px);border-color:#ff6b6b}
.btn-danger{background:linear-gradient(135deg,#a29bfe,#6c5ce7);color:#fff;box-shadow:0 8px 25px rgba(108,92,231,.4);transition:left .3s ease,top .3s ease,transform .3s ease!important;position:relative;z-index:10}
.heart-rain{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
.falling-heart{position:absolute;top:-50px;font-size:24px;animation:fall linear forwards;opacity:.8;user-select:none}
@keyframes fall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:.8}50%{opacity:1}100%{transform:translateY(110vh) rotate(360deg) scale(.3);opacity:0}}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:1000;display:flex;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:all .5s ease}
.modal-overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:30px;padding:2.5rem;max-width:450px;width:90%;text-align:center;transform:scale(.5);transition:transform .5s cubic-bezier(.68,-.55,.265,1.55);box-shadow:0 30px 80px rgba(0,0,0,.2);position:relative;overflow:hidden}
.modal-overlay.show .modal{transform:scale(1)}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#ff6b6b,#ffb3b3,#ff6b6b);background-size:200% 100%;animation:gradientBG 3s ease infinite}
.modal-icon{font-size:4rem;margin-bottom:1rem;animation:heartBeat 1.5s ease-in-out infinite;display:block}
.modal h2{color:#d63031;font-size:1.8rem;margin-bottom:.8rem}
.modal p{color:#636e72;font-size:1.1rem;line-height:1.8;margin-bottom:1.5rem}
.modal .btn{background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;box-shadow:0 8px 25px rgba(255,107,107,.4);transition:all .3s ease!important}
.modal .btn:hover{transform:translateY(-3px) scale(1.05);position:relative}
.rejection-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,#2d3436,#636e72,#2d3436);background-size:400% 400%;animation:gradientBG 6s ease infinite;z-index:3000;display:none;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:2rem}
.rejection-overlay.show{display:flex}
.rejection-heart{font-size:5rem;animation:heartBeat 2s ease-in-out infinite;margin-bottom:1rem}
.rejection-overlay h1{color:#ff6b6b;font-size:2.5rem;margin-bottom:1rem;text-shadow:0 2px 20px rgba(255,107,107,.3)}
.rejection-overlay .sub{color:#b2bec3;font-size:1.2rem;line-height:2;max-width:500px}
.rejection-overlay .funny-text{color:#fab1a0;font-size:1.1rem;margin-top:1.5rem;line-height:1.8;max-width:500px;padding:1.5rem;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1)}
.rejection-overlay .btn-retry{margin-top:2rem;padding:1rem 2.5rem;background:linear-gradient(135deg,#ff6b6b,#ee5a24);color:#fff;border:none;border-radius:50px;font-size:1.1rem;font-weight:600;cursor:pointer;box-shadow:0 8px 25px rgba(255,107,107,.4);transition:all .3s ease;position:relative}
.rejection-overlay .btn-retry:hover{transform:translateY(-3px) scale(1.05);box-shadow:0 12px 35px rgba(255,107,107,.5)}
@media(max-width:500px){.card{padding:2rem 1.2rem;border-radius:20px}.title{font-size:1.6rem}.main-heart{font-size:3.5rem}.blessing{font-size:1rem;padding:.6rem 1rem}.btn{padding:.7rem 1.5rem;font-size:.9rem}.modal{padding:1.8rem}}
</style>
</head>
<body>
<div class="hearts-bg" id="heartsBg"></div>
<div class="container">
<div class="card">
<div class="main-heart" id="mainHeart">❤️</div>
<h1 class="title" id="mainTitle">我想对你说</h1>
<div class="love-text">我喜欢你</div>
<p class="subtitle">✨ 每一个字都来自心底 ✨</p>
<div class="blessings-container" id="blessingsContainer"><div class="blessing active">❤️ 你的笑容，是我每天最温暖的阳光 ❤️</div></div>
<div class="deco-hearts">♥ ♥ ♥</div>

</div>
</div>
</div>

<div class="modal-overlay" id="modalOverlay">
<div class="modal">
<span class="modal-icon">💖</span>
<h2>❤️ 太棒了！ ❤️</h2>
<p>真的吗？我也好喜欢你！<br>从见到你的第一眼起，我的心就被你偷走了～<br><span style="display:inline-block;animation:heartBeat 1.5s ease-in-out infinite;font-size:1.5rem">💕</span></p>
<button class="btn" onclick="closeModal()">💗 我也喜欢你！</button>
</div>
</div>
<div class="rejection-overlay" id="rejectionOverlay">

<h1>我的心...碎了 💔</h1>

<div class="sub" style="margin-top:1rem">没关系，至少我们试过了 😊<br>祝你永远幸福快乐 🌈</div>
<button class="btn-retry" onclick="closeRejection()">💕 让我再想想...</button>
</div>

<script>
const blessings=['❤️ 你的笑容，是我每天最温暖的阳光 ❤️','💕 遇见你是我今生最美丽的意外 💕','💗 想牵你的手，走过春夏秋冬 💗','💖 你是我人生中最美好的风景 💖','💝 有你的每一天，都是情人节 💝','❤️ 愿与你分享每一个日出日落 ❤️','💕 你的眼睛里有星辰大海 💕','💗 你是我的小确幸，也是我的大幸福 💗','💖 想和你一起，看遍世间繁华 💖','💝 每一次心跳，都在呼唤你的名字 💝','❤️ 愿做你的铠甲，也做你的软肋 ❤️','💕 你是我藏在心底的温柔 💕','💗 余生漫漫，只想与你相伴 💗','💖 你是我写过最美的情书 💖','💝 愿时光能缓，愿故人不散 💝','❤️ 世间美好，与你环环相扣 ❤️','💕 你是我平淡生活里的糖果 💕','💗 想把你装进口袋，随身携带 💗','💖 你是我的一切，而别人只是过客 💖','💝 愿得一人心，白首不相离 💝','❤️ 你的存在让世界变得温柔 ❤️','💕 你说一句晚安，我可以回味一整天 💕','💗 想在每个夜晚，对你说一声我爱你 💗','💖 你是我今生最大的惊喜 💖','💝 此生有你，足矣 💝'];
let cb=0;
const noMsgs=['😢 你确定吗？','💔 再想想嘛～','🥺 不要拒绝我...','😭 我的心要碎了','💕 其实你也喜欢我吧？','🌟 再考虑一下嘛','🎀 你逃不掉的～','💗 我知道你舍不得','✨ 命中注定我们在一起','😊 别挣扎了～','🌈 我这么可爱，你忍心吗？','💖 你的心已经在说好呀'];
const btnNo=document.getElementById('btnNo');
const btnYes=document.getElementById('btnYes');
let noClicks=0;
let yesScale=1.0;
let noActive=false; // has it been moved at least once?
let noX=0, noY=0; // current fixed position
let noEvasions=0; // 逃跑次数
let noMovePending=0; // flag to prevent duplicate move scheduling

function bgH(){const c=document.getElementById('heartsBg');const s=['♥','❤','💕','💗','💖','💝'];const o=['rgba(255,255,255,0.12)','rgba(255,255,255,0.08)','rgba(255,200,200,0.15)'];for(let i=0;i<35;i++){const h=document.createElement('div');h.className='heart-bg';h.textContent=s[Math.floor(Math.random()*s.length)];h.style.left=Math.random()*100+'%';h.style.top=Math.random()*100+'%';h.style.fontSize=(12+Math.random()*30)+'px';h.style.color=o[Math.floor(Math.random()*o.length)];h.style.animationDuration=(8+Math.random()*12)+'s';h.style.animationDelay=Math.random()*10+'s';h.style.transform='rotate('+(Math.random()*360)+'deg)';c.appendChild(h);}}
function nx(){const c=document.getElementById('blessingsContainer');c.innerHTML='';cb=(cb+1)%blessings.length;const n=document.createElement('div');n.className='blessing';n.textContent=blessings[cb];c.appendChild(n);requestAnimationFrame(function(){requestAnimationFrame(function(){n.classList.add('active')})});const m=document.getElementById('mainHeart');m.style.animation='none';requestAnimationFrame(function(){m.style.animation='heartBeat 1.5s ease-in-out infinite'});}
function rn(){const c=document.getElementById('heartRain');const s=['❤','💕','💗','💖','💝','♥'];const o=['#ff6b6b','#ff8e8e','#ffb3b3','#d63031','#e17055','#ff4757'];for(let i=0;i<35;i++){setTimeout(function(){const h=document.createElement('div');h.className='falling-heart';h.textContent=s[Math.floor(Math.random()*s.length)];h.style.left=Math.random()*100+'%';h.style.fontSize=(16+Math.random()*28)+'px';h.style.color=o[Math.floor(Math.random()*o.length)];h.style.animationDuration=(2.5+Math.random()*3.5)+'s';c.appendChild(h);setTimeout(function(){h.remove()},6000)},i*120)}}
function cr(){for(let w=0;w<5;w++)setTimeout(function(){rn()},w*800)}
function sM(){document.getElementById('modalOverlay').classList.add('show');document.body.style.overflow='hidden';cr();for(let i=0;i<3;i++)setTimeout(function(){rn()},i*300+200);resetNo()}
function cM(){document.getElementById('modalOverlay').classList.remove('show');document.body.style.overflow=''}
function closeModal(){cM()}
function cR(){document.getElementById('rejectionOverlay').classList.remove('show');document.body.style.overflow='';resetNo();resetYes()}
function closeRejection(){cR()}
function resetYes(){yesScale=1.0;btnYes.style.transform='';btnYes.style.fontSize='';btnYes.style.padding='';btnYes.style.boxShadow='';btnYes.style.animation='pulseGlow 2s ease-in-out infinite';btnYes.innerHTML='💕 我也喜欢你';document.getElementById('mainTitle').style.transform=''}
function gY(){yesScale=Math.min(yesScale+.15,3);const s=yesScale;btnYes.style.transform='scale('+s+')';btnYes.style.fontSize=s+'rem';btnYes.style.padding=(.9*s)+'rem '+(2.2*s)+'rem';document.getElementById('mainTitle').style.transform='scale('+(1+(s-1)*.15)+')';const i2=.4+(s-1)*.3;btnYes.style.animation='pulseGlow '+Math.max(.5,2-(s-1)*.3)+'s ease-in-out infinite';btnYes.style.boxShadow='0 8px 25px rgba(255,107,107,'+i2+')';rn();if(s>=3)btnYes.innerHTML='💕 快點選我呀！'}

function resetNo(){
    btnNo.style.position='relative';
    btnNo.style.left='';
    btnNo.style.top='';
    btnNo.style.zIndex='';
    btnNo.style.pointerEvents='';
    noActive=false;
    noClicks=0;
    noEvasions=0;
    noMovePending=0;
    btnNo.innerHTML='😢 我拒绝';
    btnNo.style.fontSize='';
    btnNo.style.padding='';
}

function moveNoImpl(){
    noMovePending=0;

    // First time: switch to fixed at current screen position
    // Set a wider fixed width to prevent collapsing when removed from flex flow
    if(!noActive){
        const r=btnNo.getBoundingClientRect();
        btnNo.style.position='fixed';
        btnNo.style.left=r.left+'px';
        btnNo.style.top=r.top+'px';
        btnNo.style.width=Math.max(r.width, 160)+'px';
        btnNo.style.zIndex='2001';
        noActive=true;
    }

    noEvasions++;

    // After 8 evasions, stop running - let user click it
    if(noEvasions>=8){
        btnNo.style.pointerEvents='auto';
        btnNo.innerHTML='😢 好吧你赢了，点我吧';
        return;
    }

    // Teleport to random position within white card area
    // Use percentage-based approach for even distribution
    const card=document.querySelector('.card');
    const cardRect=card.getBoundingClientRect();
    const bw=btnNo.offsetWidth||160;
    const bh=btnNo.offsetHeight||44;
    const m=50; // larger margin to keep button away from edges

    // Clamp to viewport bounds as safety net
    const vw=window.innerWidth;
    const vh=window.innerHeight;

    const minX=Math.max(cardRect.left+m, 10);
    const maxX=Math.min(cardRect.right-bw-m, vw-bw-10);
    const minY=Math.max(cardRect.top+m, 10);
    const maxY=Math.min(cardRect.bottom-bh-m, vh-bh-10);

    const availW=maxX-minX;
    const availH=maxY-minY;

    if(availW<=0||availH<=0) return;

    // Generate random position within safe bounds
    noX=minX+Math.random()*availW;
    noY=minY+Math.random()*availH;

    btnNo.style.left=noX+'px';
    btnNo.style.top=noY+'px';

    gY();
}

// Schedule moveNo via setTimeout(0) to let browser finish processing mouseenter first
function moveNo(){
    if(noMovePending) return; // already scheduled, skip duplicate
    noMovePending=1;
    setTimeout(moveNoImpl, 0);
}

btnNo.addEventListener('mouseenter',function(){
    if(document.getElementById('rejectionOverlay').classList.contains('show'))return;
    if(noEvasions>=8) return;
    moveNo();
});
btnNo.addEventListener('click',function(){
    if(document.getElementById('rejectionOverlay').classList.contains('show'))return;
    if(noEvasions>=8){
        document.getElementById('rejectionOverlay').classList.add('show');
        document.body.style.overflow='hidden';
        for(var i=0;i<2;i++)setTimeout(function(){rn()},i*500);
        return;
    }
    noClicks++;
    var idx=(noClicks-1)%noMsgs.length;
    btnNo.innerHTML='😅 '+noMsgs[idx];
    moveNoImpl();
    rn();
    if(noClicks>=8){
        var s2=Math.max(.5,1-(noClicks-8)*.07);
        btnNo.style.fontSize=(s2*.9)+'rem';
        btnNo.style.padding=(s2*.7)+'rem '+(s2*1.5)+'rem';
    }
});
btnNo.addEventListener('touchstart',function(e){
    if(document.getElementById('rejectionOverlay').classList.contains('show'))return;
    e.preventDefault();
    if(noEvasions>=8){
        document.getElementById('rejectionOverlay').classList.add('show');
        document.body.style.overflow='hidden';
        for(var i=0;i<2;i++)setTimeout(function(){rn()},i*500);
        return;
    }
    noClicks++;
    var idx=(noClicks-1)%noMsgs.length;
    btnNo.innerHTML='😅 '+noMsgs[idx];
    moveNoImpl();
    rn();
    if(noClicks>=8){
        var s2=Math.max(.5,1-(noClicks-8)*.07);
        btnNo.style.fontSize=(s2*.9)+'rem';
        btnNo.style.padding=(s2*.7)+'rem '+(s2*1.5)+'rem';
    }
});
window.addEventListener('resize',function(){
    if(!noActive)return;
    const card=document.querySelector('.card');
    const cardRect=card.getBoundingClientRect();
    const bw=btnNo.offsetWidth||100;
    const bh=btnNo.offsetHeight||44;
    const p=20;
    const minX=cardRect.left+p;
    const maxX=cardRect.right-bw-p;
    const minY=cardRect.top+p;
    const maxY=cardRect.bottom-bh-p;
    if(maxX<=minX||maxY<=minY)return;
    noX=Math.max(minX,Math.min(noX,maxX));
    noY=Math.max(minY,Math.min(noY,maxY));
    btnNo.style.transition='none';
    btnNo.style.left=noX+'px';
    btnNo.style.top=noY+'px';
    requestAnimationFrame(function(){btnNo.style.transition=''});
});
btnNo.addEventListener('contextmenu',function(e){
    e.preventDefault();
    document.getElementById('rejectionOverlay').classList.add('show');
    document.body.style.overflow='hidden';
    for(var i=0;i<2;i++)setTimeout(function(){rn()},i*500);
});

let at=null,rt=null;
function sa(){if(at){clearInterval(at);at=null}at=setInterval(nx,3500)}sa();
document.getElementById('btnNext').addEventListener('click',function(){
    if(document.getElementById('rejectionOverlay').classList.contains('show'))return;
    if(at){clearInterval(at);at=null}if(rt){clearTimeout(rt);rt=null}nx();rt=setTimeout(function(){if(!at)sa();rt=null},8000)});
document.getElementById('btnYes').addEventListener('click',function(){
    if(document.getElementById('rejectionOverlay').classList.contains('show'))return;sM()});
